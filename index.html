<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Link Collection</title>
    <style>
        /* 全体のリセットと背景設定 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f8f9fa;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* リンク集を囲むボックス */
        .container {
            background: #ffffff;
            padding: 40px 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 480px;
            text-align: center;
        }

        /* タイトル */
        h1 {
            font-size: 24px;
            margin-bottom: 8px;
            color: #111;
        }
        .subtitle {
            font-size: 14px;
            color: #666;
            margin-bottom: 30px;
        }

        /* リンクボタンのスタイル */
        .link-list {
            list-style: none;
        }
        .link-item {
            margin-bottom: 16px;
        }
        .link-item a {
            display: block;
            padding: 16px;
            background-color: #f1f3f5;
            color: #212529;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 500;
            transition: all 0.2s ease;
            border: 1px solid transparent;
        }

        /* マウスを乗せたときの動き */
        .link-item a:hover {
            background-color: #ffffff;
            border-color: #228be6;
            color: #228be6;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(34, 139, 230, 0.15);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>渡部空夢</h1>
        <p class="subtitle"> </p>

        <ul class="link-list">
            <li class="link-item">
                <a href="https://www.youtube.com/watch?v=AcufuLZLcXs&t=110s" target="_blank" rel="noopener">
2024/10 少年男子組手決勝　渡部空夢VS宮野煌大</a>
            </li>
            <li class="link-item">
                <a href="https://www.youtube.com/watch?v=5CW81GDNHtQ" target="_blank" rel="noopener">2025/09/21 男子個人組手 -76 kg 決勝戦　渡部空夢 vs 坂本樹優</a>
            </li>
            <li class="link-item">
                <a href="https://youtube.com" target="_blank" rel="noopener">YouTube</a>
            </li>
            </ul>
    </div>

</body>
</html>
